# コスト防御: ジョブ作成エンドポイントのプロキシ層レート制限
# IP あたり 10 req/分（バースト 5 まで許容）。アプリ層の日次上限の前段の粗いフィルタ。
limit_req_zone $binary_remote_addr zone=jobs_post:10m rate=10r/m;

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name api.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS バックエンド API
server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # アップロードサイズ制限（不要だが念のため）
    client_max_body_size 1m;

    # ジョブ作成だけ厳しめにレート制限（POST 濫用＝コスト暴走の入口）
    location = /api/jobs {
        limit_req zone=jobs_post burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
