services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kirinuki
      POSTGRES_USER: kirinuki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirinuki"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: web/backend/.env
    environment:
      DATABASE_URL: postgresql://kirinuki:${POSTGRES_PASSWORD}@db:5432/kirinuki
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=10
    env_file: web/backend/.env
    environment:
      DATABASE_URL: postgresql://kirinuki:${POSTGRES_PASSWORD}@db:5432/kirinuki
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    env_file: web/backend/.env
    environment:
      DATABASE_URL: postgresql://kirinuki:${POSTGRES_PASSWORD}@db:5432/kirinuki
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
